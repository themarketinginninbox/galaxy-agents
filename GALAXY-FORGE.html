function log(msg,type='info'){
  const el=document.getElementById('log');
  const time=new Date().toTimeString().slice(0,8);
  const line=document.createElement('div');
  line.className=`log-line ${type}`;
  line.textContent=`[${time}] ${msg}`;

async function sbGet(table,params=''){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}

async function sbInsert(table,data){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  const result=await res.json();
  return Array.isArray(result)?result[0]:result;
}

async function sbUpdate(table,id,data){
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
}

footer{padding:60px 48px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:4px;color:var(--gold)}
.footer-address{font-size:11px;letter-spacing:2px;color:rgba(245,237,216,0.3);text-align:center;line-height:1.8}
.footer-links{display:flex;gap:28px}
.footer-links a{font-size:10px;letter-spacing:2px;color:rgba(245,237,216,0.35);text-decoration:none;text-transform:uppercase}
.footer-links a:hover{color:var(--gold)}
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){nav{padding:20px 24px}.nav-links,.nav-reserve{display:none}section{padding:80px 24px}#about{grid-template-columns:1fr;gap:48px}.about-visual{height:320px}.menu-grid{grid-template-columns:1fr}#experience{grid-template-columns:1fr}.exp-content{padding:60px 24px;border-left:none;border-top:1px solid var(--border)}footer{flex-direction:column;gap:24px;text-align:center}.form-row{grid-template-columns:1fr}}
</style>
</head>

<script>
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>80));
const hc=document.getElementById('hero-canvas'),ctx=hc.getContext('2d');
let W,H,P=[];
function resize(){W=hc.width=window.innerWidth;H=hc.height=window.innerHeight}resize();window.addEventListener('resize',resize);
class E{constructor(){this.r()}r(){this.x=Math.random()*W;this.y=H+20;this.s=Math.random()*2+0.5;this.sy=-(Math.random()*0.8+0.3);this.sx=(Math.random()-0.5)*0.4;this.l=1;this.d=Math.random()*0.003+0.001;this.g=Math.random()>0.6}u(){this.x+=this.sx+Math.sin(Date.now()*0.001+this.x)*0.2;this.y+=this.sy;this.l-=this.d;if(this.l<=0||this.y<-20)this.r()}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);const c=this.g?'rgba(201,168,76,':'rgba(139,26,26,';ctx.fillStyle=c+this.l+')';ctx.shadowColor=c+'0.8)';ctx.shadowBlur=6;ctx.fill()}}
for(let i=0;i<180;i++){const p=new E();p.y=Math.random()*H;p.l=Math.random();P.push(p)}
function draw(){ctx.clearRect(0,0,W,H);P.forEach(p=>{p.u();p.draw()});ctx.shadowBlur=0;requestAnimationFrame(draw)}draw();
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.1});
document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>obs.observe(el));
<\/script>
</body>
</html>`;
  return template;
}

async function startForge(){
  if(forging)return;
  forging=true;
  queue=[];
  document.getElementById('forge-btn').disabled=true;
  setStatus('FETCHING LEADS','var(--blue)');
  log('FORGE initiated — fetching leads from Supabase','info');

  try{
    const filter=document.getElementById('lead-filter').value;
    const max=parseInt(document.getElementById('max-builds').value);
    let params=`select=*&order=created_at.desc&limit=${max}`;
    if(filter!=='all')params+=`&lead_temp=eq.${filter}`;

    const leads=await sbGet('scout_leads',params);
    if(!leads.length){
      log('No leads found — run SCOUT first','warn');
      setStatus('NO LEADS','var(--amber)');
      forging=false;
      document.getElementById('forge-btn').disabled=false;
      return;
    }

    log(`${leads.length} leads loaded — beginning builds`,'success');
    queue=leads.map(lead=>({lead,status:'queued',forgeId:null}));
    renderQueue();updateStats();

    for(let i=0;i<queue.length;i++){
      const item=queue[i];
      const pct=Math.round(((i+1)/queue.length)*100);
      setProgress(pct,`FORGE BUILDING ${i+1} OF ${queue.length} — ${item.lead.name}`);
      setStatus('BUILDING','var(--forge)');
      item.status='building';
      renderQueue();updateStats();

      try{
        const html=buildHTML(item.lead);
        // Save to forge_output in Supabase
        const saved=await sbInsert('forge_output',{
          lead_id:item.lead.id,
          business_name:item.lead.name,
          html:html,
          status:'ready'
        });
        item.forgeId=saved?.id;
        item.status='saved';
        log(`Built & saved: ${item.lead.name}`,'success');
      }catch(e){
        item.status='failed';
        log(`Failed: ${item.lead.name} — ${e.message}`,'error');
      }

      renderQueue();updateStats();
      await new Promise(r=>setTimeout(r,300));
    }

    setStatus('FORGE COMPLETE','var(--green)');
    setProgress(100,`FORGE COMPLETE — ${queue.filter(i=>i.status==='saved').length} sites saved to database`);
    log(`FORGE done. ${queue.filter(i=>i.status==='saved').length} sites ready in forge_output → LAUNCH can now deploy.`,'success');

  }catch(err){
    log(`FORGE error: ${err.message}`,'error');
    setStatus('ERROR','var(--forge)');
  }

  forging=false;
  document.getElementById('forge-btn').disabled=false;
}
</script>
</body>
</html>
